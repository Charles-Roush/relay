schedule:
  hour: 9           # Local hour to send daily update (24hr)
  timezone: "US/Eastern"

garmin:
  lookback_days: 10          # How many days of history to pull
  activities_count: 10       # How many recent activities to include
  metrics:                   # Toggle which data points to pull
    sleep: true
    hrv: true
    body_battery: true
    steps: false
    stress: true
    activities: true

claude:
  model: "claude-sonnet-4-6"
  max_tokens: 4000
  daily_update:
    max_sentences: 10        # Max length of morning summary
    tone: "direct"           # direct | encouraging | detailed
  coach_notes:
    max_lines: 20            # Max notes to keep at once
    expiry_days: 21          # Auto-remove notes older than this

coaching:
  sport: "running"           # running | cycling | triathlon | general
  units: "imperial"          # imperial | metric
  focus: "Follow training"   # Informs Claude's recommendations — free text
  goal: "Late october 5k"    # Current goal — free text
